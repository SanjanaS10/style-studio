name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm run test:backend
        env:
          JWT_REFRESH_SECRET: ci_test_refresh_secret
          JWT_SECRET: ci_test_secret